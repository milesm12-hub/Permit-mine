name: Air Permit Monitor

on:
  schedule:
    # Runs every Monday at 13:00 UTC (adjust to your timezone as needed)
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip and install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run permit fetch (Texas)
        run: python permit_monitor.py fetch --state TX

      - name: Export changelog to Excel
        run: python export_changelog_xlsx.py

      - name: Commit updated database and changelog
        run: |
          git config user.name "permit-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add permits.db air_permit_changelog.xlsx
          git diff --staged --quiet || git commit -m "Automated permit snapshot: $(date -u +%Y-%m-%d)"
          git push
