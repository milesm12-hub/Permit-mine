name: Export changelog workbook

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export Excel workbook
        run: python export_changelog_xlsx.py

      - name: Upload workbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: air-permit-changelog
          path: air_permit_changelog.xlsx
